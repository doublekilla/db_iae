name: db_iaex
description: "SpaceLink — Find your sports circle"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Routing
  go_router: ^15.1.2

  # State Management
  provider: ^6.1.5

  # HTTP & API
  http: ^1.4.0

  # WebSocket
  laravel_echo: ^1.0.0-beta.1
  pusher_channels_flutter: ^2.6.0

  # Local Storage
  shared_preferences: ^2.5.3

  # Image
  cached_network_image: ^3.4.1
  image_picker: ^1.2.2

  # UI Utilities
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  intl: ^0.20.2
  google_fonts: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.8
  image_cropper: ^12.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
